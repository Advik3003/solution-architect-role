name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-account-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build account-service
        run: mvn -f account-service/pom.xml clean verify
